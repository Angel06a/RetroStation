<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroStation</title>
    <link rel="icon" type="image/png" href="Icons/favicon.png">
    <style>
        html{box-sizing:border-box}
        *,*::before,*::after{box-sizing:inherit}
        :root{
            --color-bg-base:#1c1c1c;
            --color-accent:#FFA500;
        }
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
            background-color:var(--color-bg-base);
            font-family:Arial,sans-serif;
            overflow:hidden;
            transition:background-color .3s ease-out; 
            opacity:1;
        }
        #main-container{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            opacity:0; 
            transition:opacity .3s ease-in-out; 
            z-index:10;
            pointer-events:none;
            transform:scale(1); 
            will-change: opacity; 
        }
        #main-container.active{
            pointer-events:auto;
        }
        #detail-container{
            position:absolute;
            inset:0;
            z-index:20;
            pointer-events:none;
            opacity:0;
            display:none;
            transition: opacity .3s ease-in-out;
            will-change: opacity;
        }
        #detail-container.active{
            pointer-events:auto;
        }
        #loader-spinner{
            border:4px solid rgba(255,255,255,.3);
            border-top:4px solid var(--color-accent);
            border-radius:50%;
            width:50px;
            height:50px;
            animation:spin 1s linear infinite;
        }
        @keyframes spin{
            0%{transform:rotate(0deg)}
            100%{transform:rotate(360deg)}
        }
    </style>
    <link rel="preload" href="Css/main-menu.css" as="style">
    <link rel="stylesheet" href="Css/main-menu.css" media="print" onload="this.media='all'">
    <link rel="preload" href="Css/system-menu.css" as="style">
    <link rel="stylesheet" href="Css/system-menu.css" media="print" onload="this.media='all'">
    <link rel="preload" href="Css/detail-menu.css" as="style">
    <link rel="stylesheet" href="Css/detail-menu.css" media="print" onload="this.media='all'">
    </head>
<body>
    <div id="loader-spinner"></div>
    <div id="main-container"></div>
    <div id="detail-container"></div>
    <script>
        window.decodeImage=function(img){
            return new Promise(resolve=>{
                if('decode'in img){
                    img.decode().then(resolve).catch(resolve);
                }else{
                    setTimeout(resolve,0); 
                }
            });
        };

        const mainContainer = document.getElementById('main-container');
        const detailContainer = document.getElementById('detail-container');
        const TRANSITION_DURATION = 300; 

        window.transitionScreen = function(contentChangeCallback, newBodyClass = '') {
            mainContainer.style.opacity = '0';
            mainContainer.classList.remove('active');
            document.body.className = newBodyClass;

            setTimeout(() => {
                contentChangeCallback();
                requestAnimationFrame(() => {
                    mainContainer.style.opacity = '1';
                    mainContainer.classList.add('active');
                });
            }, TRANSITION_DURATION);
        };

        // Orquestador de transiciones para el detalle
        window.openDetailTransition = function(game) {
            if (typeof window.renderDetailContent !== 'function') return;
            
            window.renderDetailContent(game);
            detailContainer.style.display = 'block'; 
            detailContainer.offsetHeight; 

            requestAnimationFrame(() => {
                detailContainer.style.opacity = '1';
                detailContainer.classList.add('active');
            });
        };

        window.closeDetailTransition = function() {
            if (!window.isDetailMenuOpen) return;

            detailContainer.style.opacity = '0';
            detailContainer.classList.remove('active');
            
            setTimeout(() => {
                if (typeof window.clearDetailContent === 'function') {
                    window.clearDetailContent();
                }
                detailContainer.style.display = 'none';
            }, TRANSITION_DURATION);
        };
        
        function loadMainMenu(){
            const scripts = ['Js/data.js', 'Js/main-menu.js', 'Js/system-menu.js', 'Js/detail-menu.js'];
            
            Promise.all(scripts.map(src => {
                return new Promise(resolve => {
                    const s = document.createElement('script');
                    s.src = src;
                    s.async = true;
                    s.onload = resolve;
                    document.body.appendChild(s);
                });
            })).then(()=>{
                // Vinculamos las funciones globales a las de transición
                window.showDetailMenu = window.openDetailTransition;
                window.hideDetailMenu = window.closeDetailTransition;

                if(window.initMainMenu){
                    window.transitionScreen(() => {
                        window.initMainMenu();
                    }, ''); 
                }
                requestAnimationFrame(()=>{
                    const loaderSpinner=document.getElementById('loader-spinner');
                    if(loaderSpinner) {
                        loaderSpinner.style.opacity='0';
                        setTimeout(()=> loaderSpinner.remove(), 1000);
                    }
                });
            }).catch(err => console.error("Error cargando scripts:", err));
        }

        document.addEventListener('DOMContentLoaded', () => setTimeout(loadMainMenu, 500));
    </script>
</body>
</html>
